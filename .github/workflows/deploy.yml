name: Deploy Wiki

on:
  push:
    branches: [main]
    paths:
      - 'wikidocs/**'
  workflow_dispatch:

# --- 이 부분을 추가하세요 (권한 설정) ---
permissions:
  contents: write
# ------------------------------------

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'wikidocs/package-lock.json'

      - name: Install & Build
        run: |
          cd wikidocs
          npm install
          npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./wikidocs/build
          # 만약 첫 배포라면 아래 설정을 추가하는 것이 안전합니다.
          force_orphan: true